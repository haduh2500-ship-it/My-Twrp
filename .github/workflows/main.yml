name: TWRP Custom Recovery Build Engine

on:
  workflow_dispatch:
    inputs:
      device_tree_url:
        description: 'Paste your custom device tree GitHub repository URL here'
        required: true
        default: 'https://github.com'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Runtime Build Workspace
      uses: actions/checkout@v4

    - name: Cleanup Environment Build Space
      uses: rokibhasansagar/slimhub_actions@main

    - name: Install Compilation Build Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Setup Secure Fixed Repo Tool Launcher
      run: |
        mkdir -p ~/bin
        # Corrected full raw domain pointer path to resolve the DNS exit code 6 block
        curl -s https://githubusercontent.com > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

    - name: Sync TWRP Minimal Source Tree
      run: |
        mkdir ~/twrp
        cd ~/twrp
        git config --global user.name "Builder"
        git config --global user.email "builder@twrp.com"
        
        # Flawlessly hardcoded core baseline mapping paths to bypass any redirection bugs
        ~/bin/repo init --depth=1 --no-repo-verify -u https://github.com -b twrp-12.1
        ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Custom Target Device Tree
      run: |
        # Manually pulls from your single custom user input field down below
        git clone ${{ github.event.inputs.device_tree_url }} ~/twrp/device/herofun/BH502G

    - name: Compile Unofficial Custom Recovery
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_BH502G-userdebug
        make bootimage -j$(nproc --all)

    - name: Upload Compiled Recovery Image Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-UnrootedRescue-BH502G
        path: /home/runner/twrp/out/target/product/BH502G/*.img
