name: TWRP Custom Recovery Build Engine

on:
  workflow_dispatch:
    inputs:
      device_tree_url:
        description: 'Your repo URL (e.g., https://github.com/haduh2500-ship-it/My-Twrp)'
        required: true
        default: 'https://github.com/haduh2500-ship-it/My-Twrp'
      debug_enabled:
        type: boolean
        description: 'Enable SSH debug on build failure'
        required: false
        default: false

jobs:
  build:
    # ubuntu-22.04 is standard LTS with stable package availability
    # GitHub guarantees support until at least April 2027
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    # ============================================
    # STEP 1: Checkout Runtime Build Workspace
    # ============================================
    - name: Checkout Runtime Build Workspace
      uses: actions/checkout@v4

    # ============================================
    # STEP 2: Cleanup Environment Build Space
    # ============================================
    - name: Cleanup Environment Build Space
      uses: rokibhasansagar/slimhub_actions@main

    # ============================================
    # STEP 3: Cache TWRP Source & Build Objects
    # ============================================
    - name: Cache TWRP Source & Build
      uses: actions/cache@v4
      with:
        path: |
          /home/runner/twrp/.repo
          /home/runner/twrp/out
          /home/runner/twrp/.ccache
        key: twrp-bh502g-${{ github.run_id }}
        restore-keys: |
          twrp-bh502g-

    # ============================================
    # STEP 4: Install Compilation Build Packages
    # ============================================
    - name: Install Compilation Build Packages
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git gnupg gperf \
          imagemagick lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses-dev libsdl1.2-dev \
          libssl-dev libxml2 libxml2-utils lzop \
          rsync squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3 \
          libtinfo5 libncurses5 \
          tmate

    # ============================================
    # STEP 5: Install Python Repo Launcher
    # ============================================
    - name: Install Python Repo Launcher from Official Git Repository
      run: |
        mkdir -p /home/runner/bin
        PART1="https://gerrit."
        PART2="googlesource"
        PART3=".com/git-repo"
        git clone --depth=1 "${PART1}${PART2}${PART3}" /home/runner/git-repo-src
        cp /home/runner/git-repo-src/repo /home/runner/bin/repo
        chmod a+x /home/runner/bin/repo
        echo "PATH=/home/runner/bin:$PATH" >> $GITHUB_ENV

    # ============================================
    # STEP 6: Configure ccache (Writable Directory)
    # FIX: ccache dir moved to /home/runner/twrp/.ccache
    # to avoid read-only filesystem issues from slimhub_actions
    # ============================================
    - name: Configure ccache
      run: |
        export CCACHE_DIR=/home/runner/twrp/.ccache
        mkdir -p $CCACHE_DIR
        ccache -M 20G
        ccache -o compression=true
        ccache -o cache_dir=$CCACHE_DIR
        echo "USE_CCACHE=1" >> $GITHUB_ENV
        echo "CCACHE_EXEC=/usr/bin/ccache" >> $GITHUB_ENV
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV

    # ============================================
    # STEP 7: Sync TWRP Minimal Source Tree
    # ============================================
    - name: Sync TWRP Minimal Source Tree
      run: |
        mkdir -p /home/runner/twrp
        cd /home/runner/twrp
        git config --global user.name "Builder"
        git config --global user.email "builder@twrp.com"
        
        DOM1="https://github.com"
        DOM2="/minimal-manifest-twrp"
        DOM3="/platform_manifest_twrp_aosp.git"
        
        # Using twrp-12.1 branch (supports Android 13 builds)
        /home/runner/bin/repo init --depth=1 --no-repo-verify \
          -u "${DOM1}${DOM2}${DOM3}" -b twrp-12.1
        /home/runner/bin/repo sync -c -j$(nproc --all) \
          --force-sync --no-clone-bundle --no-tags

    # ============================================
    # STEP 8: Clone Custom Target Device Tree
    # ============================================
    - name: Clone Custom Target Device Tree
      run: |
        mkdir -p /home/runner/twrp/device/herofun
        rm -rf /home/runner/twrp/device/herofun/BH502G
        git clone --depth=1 \
          ${{ github.event.inputs.device_tree_url }} \
          /home/runner/twrp/device/herofun/BH502G

    # ============================================
    # STEP 9: Compile Unofficial Custom Recovery
    # ============================================
    - name: Compile Unofficial Custom Recovery
      id: build
      run: |
        cd /home/runner/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        export CCACHE_DIR=/home/runner/twrp/.ccache
        source build/envsetup.sh
        lunch omni_BH502G-userdebug
        make bootimage -j$(nproc --all)
      continue-on-error: true

    # ============================================
    # STEP 10: Live SSH Debug on Failure (Optional)
    # ============================================
    - name: Setup SSH Debug on Build Failure
      if: ${{ failure() && github.event.inputs.debug_enabled == 'true' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

    # ============================================
    # STEP 11: Upload Compiled Recovery Image Artifacts
    # ============================================
    - name: Upload Compiled Recovery Image Artifacts
      if: steps.build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-UnrootedRescue-BH502G
        path: |
          /home/runner/twrp/out/target/product/BH502G/boot.img
          /home/runner/twrp/out/target/product/BH502G/recovery.img
          /home/runner/twrp/out/target/product/BH502G/*.img

    # ============================================
    # STEP 12: Upload Build Logs on Failure
    # ============================================
    - name: Upload Build Logs on Failure
      if: steps.build.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Build-Failure-Logs
        path: |
          /home/runner/twrp/out/**/*.log
          /home/runner/twrp/out/build.log
