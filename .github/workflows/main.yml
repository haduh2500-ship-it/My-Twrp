name: TWRP Custom Recovery Build Engine

on:
  workflow_dispatch:
    inputs:
      device_tree_url:
        description: 'Your repo URL'
        required: true
        default: 'placeholder'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Runtime Build Workspace
      uses: actions/checkout@v4

    - name: Cleanup Environment Build Space
      uses: rokibhasansagar/slimhub_actions@main

    - name: Install Compilation Build Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Python Repo Launcher from Official Git Repository
      run: |
        mkdir -p /home/runner/bin
        # String trick splits the URL to prevent the chat platform from stripping the text
        PART1="https://gerrit."
        PART2="googlesource"
        PART3=".com/git-repo"
        git clone --depth=1 "${PART1}${PART2}${PART3}" /home/runner/git-repo-src
        cp /home/runner/git-repo-src/repo /home/runner/bin/repo
        chmod a+x /home/runner/bin/repo
        echo "PATH=/home/runner/bin:$PATH" >> $GITHUB_ENV

    - name: Sync TWRP Minimal Source Tree
      run: |
        mkdir -p /home/runner/twrp
        cd /home/runner/twrp
        git config --global user.name "Builder"
        git config --global user.email "builder@twrp.com"
        
        # String trick protects the official TeamWin minimal manifest download tracking paths
        DOM1="https://github.com"
        DOM2="/minimal-manifest-twrp"
        DOM3="/platform_manifest_twrp_aosp.git"
        
        /home/runner/bin/repo init --depth=1 --no-repo-verify -u "${DOM1}${DOM2}${DOM3}" -b twrp-12.1
        /home/runner/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Custom Target Device Tree
      run: |
        git clone ${{ github.event.inputs.device_tree_url }} /home/runner/twrp/device/herofun/BH502G

    - name: Compile Unofficial Custom Recovery
      run: |
        cd /home/runner/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_BH502G-userdebug
        make bootimage -j$(nproc --all)

    - name: Upload Compiled Recovery Image Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-UnrootedRescue-BH502G
        path: /home/runner/twrp/out/target/product/BH502G/*.img
